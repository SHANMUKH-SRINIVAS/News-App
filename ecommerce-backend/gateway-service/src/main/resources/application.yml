spring:
  application:
    name: gateway-service

server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/products/**
        - id: cart-service
          uri: http://localhost:8083
          predicates:
            - Path=/cart/**

security:
  jwt:
    secret: change-me-to-a-long-random-secret-key-1234567890

